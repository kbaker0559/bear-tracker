<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bear Tracker Real v1.1</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--green:#123524;--gold:#d9b45f;--bg:#f6f4ef;--card:#fff;--muted:#64748b;--border:#e2e8f0;--danger:#b91c1c;--ok:#15803d}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:#1f2933}header{background:var(--green);color:#fff;padding:18px 22px}header h1{margin:0;font-size:22px}header p{margin:4px 0 0;color:#d9eadf}.wrap{max-width:1100px;margin:auto;padding:20px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tabs button,.btn{border:0;border-radius:999px;padding:10px 14px;background:#e8efe9;color:#123524;font-weight:700;cursor:pointer}.tabs button.active,.btn.primary{background:var(--green);color:white}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.05)}label{display:block;font-weight:700;margin-top:10px}input,select{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:15px;margin-top:5px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left}th{background:#f1f5f9}.small{font-size:13px;color:var(--muted)}.status{padding:10px;border-radius:12px;background:#f8fafc;border:1px solid var(--border);margin:10px 0}.ok{color:var(--ok);font-weight:700}.bad{color:var(--danger);font-weight:700}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.row .btn{margin-top:10px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef2ff;font-size:12px;font-weight:700}.money{font-weight:700;color:var(--green)}
  </style>
</head>
<body>
<header><h1>Bear Tracker</h1><p>Real v1.1 · Live Database Player Sync</p></header>
<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <main id="app"></main>
</div>
<script>
const STORAGE_KEY='bearTrackerRealV11';
const defaultPlayers=[
 {id:'fred-tucker',name:'Fred Tucker',handicap:6,quota:30,pin:'1234',active:true,isAdmin:false},{id:'paul-tucker-jr',name:'Paul Tucker JR',handicap:10,quota:27,pin:'1234',active:true,isAdmin:false},{id:'steve-robin',name:'Steve Robin',handicap:11,quota:23,pin:'1234',active:true,isAdmin:false},{id:'russ-lizzoli',name:'Russ Lizzoli',handicap:16,quota:16,pin:'1234',active:true,isAdmin:false},{id:'cam-crollard',name:'Cam Crollard',handicap:5,quota:30,pin:'1234',active:true,isAdmin:false},{id:'paul-tucker-sr',name:'Paul Tucker SR',handicap:8,quota:25,pin:'1234',active:true,isAdmin:false},{id:'kevin-baker',name:'Kevin Baker',handicap:12,quota:19,pin:'1234',active:true,isAdmin:true},{id:'mark-knuutilla',name:'Mark Knuutilla',handicap:10,quota:24,pin:'1234',active:true,isAdmin:false},{id:'tyler-adams',name:'Tyler Adams',handicap:9,quota:25,pin:'1234',active:true,isAdmin:false},{id:'don-maines',name:'Don Maines',handicap:13,quota:21,pin:'1234',active:true,isAdmin:false},{id:'dave-hall',name:'Dave Hall',handicap:9,quota:26,pin:'1234',active:true,isAdmin:false},{id:'ed-sanchez',name:'Ed Sanchez',handicap:12,quota:21,pin:'1234',active:true,isAdmin:false},{id:'neal-self',name:'Neal Self',handicap:11,quota:19,pin:'1234',active:true,isAdmin:false},{id:'chuck-blankenship',name:'Chuck Blankenship',handicap:12,quota:26,pin:'1234',active:true,isAdmin:false},{id:'bruce-coleman',name:'Bruce Coleman',handicap:11,quota:19,pin:'1234',active:true,isAdmin:false},{id:'george-heider',name:'George Heider',handicap:6,quota:26,pin:'1234',active:true,isAdmin:false},{id:'anthony-ciuzio',name:'Anthony Ciuzio',handicap:4,quota:29,pin:'1234',active:true,isAdmin:false},{id:'tom-tzobanakis',name:'Tom Tzobanakis',handicap:12,quota:21,pin:'1234',active:true,isAdmin:false},{id:'shawn-boone',name:'Shawn Boone',handicap:16,quota:15,pin:'1234',active:true,isAdmin:false},{id:'blake-donahue',name:'Blake Donahue',handicap:4,quota:23,pin:'1234',active:true,isAdmin:false},{id:'wayne-smith',name:'Wayne Smith',handicap:11,quota:18,pin:'1234',active:true,isAdmin:false},{id:'preston-rager',name:'Preston Rager',handicap:11,quota:21,pin:'1234',active:true,isAdmin:false},{id:'les-smith',name:'Les Smith',handicap:19,quota:16,pin:'1234',active:true,isAdmin:false},{id:'mike-ondrasik',name:'Mike Ondrasik',handicap:13,quota:18,pin:'1234',active:true,isAdmin:false}
];
const defaultState={tab:'home',players:defaultPlayers,supaUrl:'',supaKey:'',dbStatus:'Not configured',lastSync:null};
let state=load();
function load(){try{return {...defaultState,...JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}}catch{return {...defaultState}}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function setTab(t){state.tab=t;save();render()}
function client(){ if(!state.supaUrl||!state.supaKey) throw new Error('Enter Supabase URL and anon key first.'); return window.supabase.createClient(state.supaUrl,state.supaKey); }
async function testDb(){try{const c=client(); const {data,error}=await c.from('players').select('id').limit(1); if(error) throw error; state.dbStatus='Connected to Supabase. players table found.'; state.lastSync=new Date().toLocaleString(); save(); render()}catch(e){state.dbStatus='Connection failed: '+e.message; save(); render()}}
async function pushPlayers(){try{const c=client(); const rows=state.players.map(p=>({id:p.id,name:p.name,handicap:+p.handicap,quota:+p.quota,pin:String(p.pin||'1234'),active:!!p.active,is_admin:!!p.isAdmin,updated_at:new Date().toISOString()})); const {error}=await c.from('players').upsert(rows); if(error) throw error; state.dbStatus='Pushed '+rows.length+' local players to Supabase.'; state.lastSync=new Date().toLocaleString(); save(); render()}catch(e){state.dbStatus='Push failed: '+e.message; save(); render()}}
async function loadPlayers(){try{const c=client(); const {data,error}=await c.from('players').select('*').order('name',{ascending:true}); if(error) throw error; state.players=data.map(r=>({id:r.id,name:r.name,handicap:r.handicap,quota:r.quota,pin:r.pin,active:r.active,isAdmin:r.is_admin})); state.dbStatus='Loaded '+state.players.length+' players from Supabase.'; state.lastSync=new Date().toLocaleString(); save(); render()}catch(e){state.dbStatus='Load failed: '+e.message; save(); render()}}
function updatePlayer(id,field,value){state.players=state.players.map(p=>p.id===id?{...p,[field]:field==='active'||field==='isAdmin'?!!value:(field==='handicap'||field==='quota'?Number(value):value)}:p);save();render()}
function addPlayer(){const name=prompt('New golfer name?');if(!name)return;const id=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');state.players.push({id,name,handicap:0,quota:0,pin:'1234',active:true,isAdmin:false});save();render()}
function resetPlayers(){if(confirm('Reset local players to original Saturday list?')){state.players=defaultPlayers;save();render()}}
function renderTabs(){const tabs=['home','players','live database'];document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="${state.tab===t?'active':''}" onclick="setTab('${t}')">${t.replace(/\b\w/g,c=>c.toUpperCase())}</button>`).join('')}
function render(){renderTabs(); const app=document.getElementById('app'); if(state.tab==='players') return renderPlayers(app); if(state.tab==='live database') return renderDb(app); renderHome(app)}
function renderHome(app){const active=state.players.filter(p=>p.active).length;app.innerHTML=`<div class="grid"><div class="card"><span class="pill">Real v1.1</span><h2>Live Database Player Sync</h2><p>This version is the first real bridge between the local Bear Tracker app and Supabase.</p><p><b>${active}</b> active players · <b>${state.players.length}</b> total players</p><p class="small">Scores/rounds still run locally. Player sync is the first live-data step.</p></div><div class="card"><h2>Next Build</h2><ul><li>Sync rounds</li><li>Sync groups</li><li>Sync hole scores</li><li>Real-time score updates across phones</li></ul></div></div>`}
function renderPlayers(app){app.innerHTML=`<div class="card"><div class="row"><h2 style="flex:1">Players</h2><button class="btn primary" onclick="addPlayer()">Add Golfer</button><button class="btn" onclick="resetPlayers()">Reset Local List</button></div><table><thead><tr><th>Name</th><th>HDCP</th><th>Quota</th><th>PIN</th><th>Active</th><th>Admin</th></tr></thead><tbody>${state.players.map(p=>`<tr><td><input value="${p.name}" onchange="updatePlayer('${p.id}','name',this.value)"></td><td><input type="number" value="${p.handicap}" onchange="updatePlayer('${p.id}','handicap',this.value)"></td><td><input type="number" value="${p.quota}" onchange="updatePlayer('${p.id}','quota',this.value)"></td><td><input value="${p.pin}" onchange="updatePlayer('${p.id}','pin',this.value)"></td><td><input type="checkbox" ${p.active?'checked':''} onchange="updatePlayer('${p.id}','active',this.checked)"></td><td><input type="checkbox" ${p.isAdmin?'checked':''} onchange="updatePlayer('${p.id}','isAdmin',this.checked)"></td></tr>`).join('')}</tbody></table></div>`}
function renderDb(app){const configured=state.supaUrl&&state.supaKey;app.innerHTML=`<div class="grid"><div class="card"><h2>Live Database</h2><label>Supabase Project URL</label><input placeholder="https://xxxx.supabase.co" value="${state.supaUrl}" onchange="state.supaUrl=this.value.trim();save()"><label>Supabase anon/public key</label><input placeholder="eyJ..." value="${state.supaKey}" onchange="state.supaKey=this.value.trim();save()"><div class="row"><button class="btn primary" onclick="testDb()">Test Connection</button><button class="btn" onclick="pushPlayers()">Push Local Players</button><button class="btn" onclick="loadPlayers()">Load Players</button></div><div class="status"><div class="${state.dbStatus.includes('failed')?'bad':(state.dbStatus.includes('Connected')||state.dbStatus.includes('Pushed')||state.dbStatus.includes('Loaded')?'ok':'')}">${state.dbStatus}</div><div class="small">Last sync: ${state.lastSync||'never'}</div></div></div><div class="card"><h2>Setup Steps</h2><ol><li>Create Supabase project.</li><li>Run <code>supabase/schema.sql</code>.</li><li>Run <code>supabase/seed.sql</code>.</li><li>Paste URL and anon key here.</li><li>Test connection.</li></ol><p class="small">Configured: ${configured?'Yes':'No'}</p></div></div>`}
render();
</script>
</body>
</html>
